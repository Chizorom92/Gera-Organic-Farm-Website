<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-Login</title>
    <link rel="stylesheet" href="netflix2.css">
</head>
<body>
    <h1 id="head"">NETFLIX</h1>

    <div class="sign-page">
        <h1>Sign In</h1>
        <div class="credent">
            <form action="#">
                <input type="email" id="emailphone" placeholder="Email or Phone number" required> <br> <br>
                <input type="password" id="password" placeholder="Password" minlength="4" maxlength="4" required><br><br>
                <input type="submit" value="Sign In" id="sign">           
            </form>
                    <br>
            <div class="sect">

                   <div class="section">     
                        <input type="checkbox" id="remember">
                        <label for="remember" id="lab">Remember me</label>
                   </div>
                <p id="help"> <a href="#">Need help?</a></p>
            </div>
        
        </div>


        <p id="firstp">New to Netflix? <strong><a href="#">Sign up now</a></strong></p>
        <p id="secondp">This page is protected by Google reCAPTCHA to <br>ensure you're not a robot. <a href="#">Learn more</a></p>

        


    </div>



    
</body>
</html>
